server {
    listen 80;
    server_name netsentry.local netsentry.lan ap.lan 192.168.1.19 10.10.10.1 _;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name netsentry.local netsentry.lan ap.lan 192.168.1.19 10.10.10.1 _;

    ssl_certificate /etc/netsentry/certs/netsentry.crt;
    ssl_certificate_key /etc/netsentry/certs/netsentry.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        allow 192.168.1.11/32;
        allow 10.10.10.0/24;
        deny all;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        allow 192.168.1.11/32;
        allow 10.10.10.0/24;
        deny all;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
